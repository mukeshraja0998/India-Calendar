{% extends "layout.html" %}

{% block title %}India Calendar - Manage Subscription{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="glass-card">
                <h2 class="text-center text-dark mb-4">⚙️ Manage Subscription</h2>
                <form action="/manage" method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label text-dark">📩 Enter Registered Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="yourname@example.com" required>
                        <div class="form-text mt-2 text-dark opacity-75">We will look up your active subscriptions.</div>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">🔍 Find Subscription</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
