{% extends "layout.html" %}

{% block title %}India Calendar - Notifications{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="glass-card">
                <h2 class="text-center text-dark mb-4">📧 Event Notifications</h2>
                <form action="/add-new" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label text-dark">👤 Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Enter your name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-dark">📩 Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3">
                        <label for="calendarType" class="form-label text-dark">📅 Select Calendar Type</label>
                        <select id="calendarType" name="calendarType" class="form-select" required>
                            <option value="assamese">Assamese</option>
                            <option value="bengali">Bengali</option>
                            <option value="gujarati">Gujarati</option>
                            <option value="hindi">Hindi</option>
                            <option value="isckon">ISCKON</option>
                            <option value="kannada">Kannada</option>
                            <option value="malayalam">Malayalam</option>
                            <option value="marathi">Marathi</option>
                            <option value="nepali">Nepali</option>
                            <option value="oriya">Oriya</option>
                            <option value="tamil" selected>Tamil</option>
                            <option value="telugu">Telugu</option>
                        </select>
                    </div>

                    <!-- Email Notification Radio Buttons -->
                    <div class="mb-4">
                        <label class="form-label text-dark d-block">📧 Receive Email Notifications?</label>
                        <div class="form-check form-check-inline bg-white bg-opacity-75 p-2 rounded px-4 border">
                            <input class="form-check-input" type="radio" name="email_notification" id="emailYes" value="yes" required>
                            <label class="form-check-label text-dark" for="emailYes">Yes</label>
                        </div>
                        <div class="form-check form-check-inline bg-white bg-opacity-75 p-2 rounded px-4 border">
                            <input class="form-check-input" type="radio" name="email_notification" id="emailNo" value="no" required>
                            <label class="form-check-label text-dark" for="emailNo">No</label>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">📨 Subscribe</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
